<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Perfil do Cliente</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header>
    <h1>📚 Biblioteca - Cliente</h1>
</header>

<main>

    <h2>Bem-vindo, Cliente!</h2>

    <section class="menu">
        <button onclick="verLivros()">📖 Ver Livros</button>
        <button onclick="meusEmprestimos()">📚 Meus Empréstimos</button>
        <button onclick="logout()">🚪 Sair</button>
    </section>

    <section id="conteudo"></section>

</main>

<script>
function verLivros() {
    document.getElementById("conteudo").innerHTML = `
        <h3>Lista de Livros</h3>
        <p>Livro 1</p>
        <p>Livro 2</p>
        <p>Livro 3</p>
    `;
}

function meusEmprestimos() {
    document.getElementById("conteudo").innerHTML = `
        <h3>Seus Empréstimos</h3>
        <p>Nenhum empréstimo ainda.</p>
    `;
}

function logout() {
    window.location.href = "login.html";
}
</script>

</body>
</html>
